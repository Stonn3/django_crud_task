<!doctype html>
<html>
<head><meta charset="utf-8"><title>Delete</title></head>
<body>
  <h1>Delete book</h1>
  <p>Are you sure you want to delete: <b>{{ object.title }}</b>?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
  </form>
  <p><a href="/books/">Cancel</a></p>
</body>
</html>
