<!doctype html>
<html>
<head><meta charset="utf-8"><title>Books</title></head>
<body>
  <h1>Books</h1>
  <p><a href="/books/new/">Add book</a></p>
  <ul>
    {% for b in books %}
      <li>
        <a href="/books/{{ b.id }}/">{{ b.title }}</a>
        (ISBN: {{ b.isbn }})
        <form action="/books/{{ b.id }}/delete/" method="post" style="display:inline;">
          {% csrf_token %}
          <button type="submit">Delete</button>
        </form>
      </li>
    {% empty %}
      <li>No books</li>
    {% endfor %}
  </ul>
</body>
</html>
